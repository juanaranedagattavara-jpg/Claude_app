<style>
  :root {
    color-scheme: light;
    --red: #dc2626; --red-dark: #991b1b; --red-soft: #fef2f2;
    --black: #0a0a0a; --gray-900: #1a1a1a; --gray-800: #2a2a2a; --gray-700: #3a3a3a;
    --gray-500: #6b7280; --gray-400: #9ca3af; --gray-200: #e5e7eb;
    --gray-100: #f3f4f6; --gray-50: #fafafa; --white: #fff;
    --success: #16a34a; --warn: #d97706; --info: #2563eb;
    --whatsapp: #25d366;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-900); }

  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .sidebar { background: var(--black); color: white; padding: 22px 0 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .brand { padding: 0 22px 24px; border-bottom: 1px solid var(--gray-800); }
  .brand-row { display: flex; align-items: center; gap: 12px; }
  .brand-mark { width: 36px; height: 36px; background: var(--red); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; }
  .brand-name { font-size: 18px; font-weight: 800; letter-spacing: 1px; }
  .brand-tag { font-size: 10px; color: var(--gray-400); margin-top: 2px; letter-spacing: 0.6px; }
  .nav { padding: 14px 12px; }
  .nav-section { font-size: 10px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 1.2px; padding: 14px 12px 6px; }
  .nav a { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 7px; color: var(--gray-200); text-decoration: none; font-size: 14px; font-weight: 500; margin-bottom: 2px; transition: background 0.15s; }
  .nav a:hover { background: var(--gray-900); color: white; }
  .nav a.active { background: var(--red); color: white; }
  .nav a .ico { width: 18px; height: 18px; flex-shrink: 0; }
  .nav a .badge { margin-left: auto; background: var(--red); color: white; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 700; }
  .nav a.active .badge { background: rgba(255,255,255,0.25); }
  .nav a.wa-link.active { background: var(--whatsapp); }
  .sidebar-foot { padding: 14px 22px; border-top: 1px solid var(--gray-800); font-size: 11px; color: var(--gray-500); margin-top: 12px; }
  .ceo-card { padding: 14px 22px; margin: 6px 0 0; border-top: 1px solid var(--gray-800); }
  .ceo-name { font-size: 13px; font-weight: 700; color: white; }
  .ceo-role { font-size: 10px; color: var(--gray-400); margin-top: 2px; letter-spacing: 0.4px; }

  .main { display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: white; border-bottom: 1px solid var(--gray-200); padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 5; }
  .topbar h2 { margin: 0; font-size: 20px; font-weight: 700; color: var(--gray-900); }
  .topbar .subtitle { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
  .topbar .actions { display: flex; gap: 10px; align-items: center; }
  .updated { font-size: 11px; color: var(--gray-500); }
  .content { padding: 24px 28px; max-width: 1320px; width: 100%; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent; text-decoration: none; transition: all 0.15s; }
  .btn-primary { background: var(--red); color: white; }
  .btn-primary:hover { background: var(--red-dark); }
  .btn-dark { background: var(--black); color: white; }
  .btn-dark:hover { background: var(--gray-800); }
  .btn-outline { background: white; border-color: var(--gray-200); color: var(--gray-900); }
  .btn-outline:hover { border-color: var(--black); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .panel { background: white; border: 1px solid var(--gray-200); border-radius: 12px; overflow: hidden; margin-bottom: 18px; }
  .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
  .panel-title { font-size: 14px; font-weight: 700; color: var(--gray-900); }
  .panel-subtitle { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
  .panel-body { padding: 20px; }
  .panel-body.flush { padding: 0; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .kpi { background: white; border: 1px solid var(--gray-200); border-radius: 12px; padding: 16px 18px; position: relative; overflow: hidden; }
  .kpi.accent { background: var(--black); color: white; border-color: var(--black); }
  .kpi.accent .kpi-label { color: var(--gray-400); }
  .kpi.accent .kpi-value { color: white; }
  .kpi.accent .kpi-sub { color: var(--gray-400); }
  .kpi.accent::after { content: ''; position: absolute; right: -20px; bottom: -20px; width: 80px; height: 80px; background: var(--red); border-radius: 50%; opacity: 0.15; }
  .kpi.wa { background: var(--whatsapp); color: white; border-color: var(--whatsapp); }
  .kpi.wa .kpi-label, .kpi.wa .kpi-sub { color: rgba(255,255,255,0.85); }
  .kpi.wa .kpi-value { color: white; }
  .kpi-label { font-size: 11px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
  .kpi-value { font-size: 28px; font-weight: 800; color: var(--gray-900); margin-top: 6px; line-height: 1.1; }
  .kpi-value.red { color: var(--red); }
  .kpi-value.success { color: var(--success); }
  .kpi-value.warn { color: var(--warn); }
  .kpi-sub { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
  .kpi-trend { font-size: 11px; margin-top: 6px; font-weight: 600; }
  .kpi-trend.up { color: var(--success); }
  .kpi-trend.down { color: var(--red); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 12px 18px; text-align: left; border-bottom: 1px solid var(--gray-200); vertical-align: top; }
  th { background: var(--gray-50); font-size: 11px; text-transform: uppercase; color: var(--gray-500); letter-spacing: 0.4px; font-weight: 700; }
  tr:last-child td { border-bottom: none; }
  tr.row-click { cursor: pointer; }
  tr.row-click:hover td { background: var(--red-soft); }

  .pill { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
  .pill.lead { background: #fef2f2; color: var(--red); }
  .pill.cliente { background: #fff4e0; color: var(--warn); }
  .pill.colaborador { background: #e0e8f0; color: #2e5780; }
  .pill.spam, .pill.rechazado, .pill.rejected { background: var(--gray-100); color: var(--gray-700); }
  .pill.proveedor, .pill.desconocido, .pill.digest { background: var(--gray-100); color: var(--gray-700); }
  .pill.draft, .pill.generated { background: #fff4e0; color: var(--warn); }
  .pill.sent, .pill.approved { background: #e0f0e0; color: var(--success); }
  .pill.accepted { background: #c8e6c2; color: #155f0f; }
  .pill.expired { background: var(--gray-100); color: var(--gray-500); }
  .pill.discarded { background: var(--gray-100); color: var(--gray-500); }
  .pill.live { background: #e0f0e0; color: var(--success); }
  .pill.live::before { content: '●'; margin-right: 4px; color: var(--success); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .empty { padding: 40px 20px; text-align: center; color: var(--gray-500); font-size: 13px; }
  .empty-icon { font-size: 32px; opacity: 0.4; margin-bottom: 10px; }
  .empty-title { font-weight: 600; color: var(--gray-700); margin-bottom: 4px; }

  .loading { text-align: center; padding: 50px; color: var(--gray-500); font-size: 13px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
  .spinner.dark { border-color: rgba(0,0,0,0.15); border-top-color: var(--gray-700); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .err { padding: 14px 18px; color: white; background: var(--red); border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
  .info { padding: 14px 18px; color: var(--black); background: #fef3c7; border-radius: 8px; margin-bottom: 16px; font-size: 13px; border-left: 4px solid var(--warn); }
  .success-msg { padding: 14px 18px; color: white; background: var(--success); border-radius: 8px; margin-bottom: 16px; font-size: 13px; }

  .muted { color: var(--gray-500); font-size: 11px; }
  .truncate { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .modal-bg { position: fixed; inset: 0; background: rgba(10,10,10,0.65); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; backdrop-filter: blur(2px); }
  .modal { background: white; border-radius: 14px; max-width: 760px; width: 100%; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .modal-h { padding: 18px 22px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; background: var(--black); color: white; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close { background: transparent; color: white; border: none; cursor: pointer; font-size: 22px; padding: 4px 10px; border-radius: 6px; }
  .modal-close:hover { background: var(--gray-800); }
  .modal-b { padding: 22px; overflow-y: auto; }
  .modal-f { padding: 14px 22px; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; justify-content: flex-end; background: var(--gray-50); }

  .detail-row { display: flex; gap: 6px; margin-bottom: 6px; font-size: 13px; }
  .detail-row .k { color: var(--gray-500); min-width: 110px; }
  .detail-row .v { color: var(--gray-900); font-weight: 500; }

  .filter-bar { display: flex; gap: 10px; padding: 14px 20px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200); align-items: center; flex-wrap: wrap; }
  .filter-bar input, .filter-bar select { width: auto; min-width: 140px; padding: 8px 12px; border: 1px solid var(--gray-200); border-radius: 7px; font-size: 13px; }
  .input-search { padding: 8px 12px 8px 32px !important; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2.5' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='M21 21l-4.35-4.35'/></svg>"); background-repeat: no-repeat; background-position: 10px center; }

  /* Hero */
  .hero { background: linear-gradient(135deg, var(--black), var(--gray-800)); color: white; padding: 32px; border-radius: 14px; margin-bottom: 22px; position: relative; overflow: hidden; }
  .hero::after { content: ''; position: absolute; top: -50%; right: -10%; width: 60%; height: 200%; background: radial-gradient(circle, rgba(220,38,38,0.3) 0%, transparent 60%); transform: rotate(20deg); }
  .hero-greet { font-size: 12px; color: var(--gray-400); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; position: relative; z-index: 1; }
  .hero h2 { margin: 0 0 8px; font-size: 28px; font-weight: 800; position: relative; z-index: 1; }
  .hero p { margin: 0; opacity: 0.85; font-size: 15px; position: relative; z-index: 1; line-height: 1.55; max-width: 720px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  .chart-wrap { padding: 16px; height: 240px; }
  .bar-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 12px; }
  .bar-row .bar-label { min-width: 70px; color: var(--gray-700); }
  .bar-row .bar-track { flex: 1; height: 16px; background: var(--gray-100); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-row .bar-fill { height: 100%; background: var(--red); border-radius: 4px; transition: width 0.4s; }
  .bar-row .bar-value { min-width: 32px; text-align: right; color: var(--gray-700); font-weight: 600; }

  /* Chat messages */
  .chat-msg { padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; max-width: 80%; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
  .chat-msg.human { background: var(--gray-100); margin-right: auto; border-bottom-left-radius: 4px; }
  .chat-msg.ai { background: #d4f5dc; color: var(--gray-900); margin-left: auto; border-bottom-right-radius: 4px; }
  .chat-author { font-size: 10px; color: var(--gray-500); margin-bottom: 2px; }

  /* MOBILE - bottom nav style */
  .mobile-only { display: none; }
  .menu-btn { display: none; }
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: fixed; top: 0; left: 0; width: 280px; height: 100vh; z-index: 50; transform: translateX(-100%); transition: transform 0.25s; box-shadow: 0 0 30px rgba(0,0,0,0.3); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 49; }
    .sidebar-backdrop.show { display: block; }
    .menu-btn { display: inline-flex; background: var(--black); color: white; border: none; padding: 8px 12px; border-radius: 7px; align-items: center; gap: 8px; font-weight: 600; font-size: 13px; cursor: pointer; margin-right: 10px; }
    .menu-btn svg { width: 18px; height: 18px; }
    .topbar { padding: 12px 16px; gap: 8px; flex-wrap: wrap; }
    .topbar h2 { font-size: 17px; }
    .topbar .subtitle { font-size: 11px; }
    .topbar .actions { gap: 6px; }
    .topbar .actions .updated { display: none; }
    .content { padding: 14px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .kpi { padding: 12px 14px; }
    .kpi-value { font-size: 20px; }
    .kpi-label { font-size: 10px; }
    .kpi-sub { font-size: 10px; }
    .grid-2 { grid-template-columns: 1fr; }
    .hero { padding: 22px 18px; }
    .hero h2 { font-size: 20px; }
    .hero p { font-size: 13px; }
    .panel-body.flush { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { min-width: 520px; font-size: 12px; }
    th, td { padding: 9px 12px; }
    .truncate { max-width: 180px; }
    .modal-bg { padding: 0; align-items: flex-end; }
    .modal { max-height: 95vh; border-radius: 14px 14px 0 0; }
    .modal-h { padding: 14px 18px; }
    .modal-title { font-size: 14px; }
    .modal-b { padding: 16px; }
    .modal-f { padding: 12px 16px; flex-wrap: wrap; }
    .form-row { grid-template-columns: 1fr; }
    .filter-bar { padding: 10px 14px; }
    .filter-bar input, .filter-bar select { min-width: 100%; width: 100%; }
    .nav { padding: 18px 14px; }
    .nav a { font-size: 14px; padding: 12px; }
    .mobile-only { display: flex; }
    .desktop-only { display: none; }
  }
  @media (max-width: 480px) {
    .kpi-grid { grid-template-columns: 1fr; }
    .topbar h2 { font-size: 16px; }
    .hero h2 { font-size: 18px; }
  }
</style>
</head>

<script>

const $ = (s) => document.querySelector(s);
const fmtCLP = (n) => '$ ' + (Number(n)||0).toLocaleString('es-CL');
const fmtDate = (s) => { if(!s) return '-'; const d = new Date(s); return d.toLocaleDateString('es-CL') + ' ' + d.toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'}); };
const fmtDateShort = (s) => { if(!s) return '-'; return new Date(s).toLocaleDateString('es-CL'); };
const ago = (s) => {
  if (!s) return '-';
  const diff = (Date.now() - new Date(s).getTime()) / 1000;
  if (diff < 60) return 'hace un instante';
  if (diff < 3600) return `hace ${Math.floor(diff/60)} min`;
  if (diff < 86400) return `hace ${Math.floor(diff/3600)} h`;
  if (diff < 604800) return `hace ${Math.floor(diff/86400)} dias`;
  return fmtDateShort(s);
};
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const saludo = () => {
  const h = new Date().getHours();
  if (h < 6) return 'Buenas noches';
  if (h < 13) return 'Buenos dias';
  if (h < 20) return 'Buenas tardes';
  return 'Buenas noches';
};

async function rpc(name, body = {}) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`Error ${r.status}: ${await r.text()}`);
  return r.json();
}

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = type === 'error' ? 'err' : 'success-msg';
  el.style.cssText = 'position:fixed;top:20px;right:20px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.2);max-width:340px';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.4s'; }, 2600);
  setTimeout(() => el.remove(), 3000);
}

async function getDashboard(force = false) {
  if (!force && cache.dashboard && (Date.now() - cache.dashboardAt < 30_000)) return cache.dashboard;
  cache.dashboard = await rpc('dashboard_full');
  cache.dashboardAt = Date.now();
  return cache.dashboard;
}
async function getChatbot(force = false) {
  if (!force && cache.chatbot && (Date.now() - cache.chatbotAt < 30_000)) return cache.chatbot;
  cache.chatbot = await rpc('chatwoot_metrics');
  cache.chatbotAt = Date.now();
  return cache.chatbot;
}
async function getExec(force = false) {
  if (!force && cache.exec && (Date.now() - cache.execAt < 30_000)) return cache.exec;
  cache.exec = await rpc('executive_dashboard');
  cache.execAt = Date.now();
  return cache.exec;
}

function setActiveNav(route) {
  document.querySelectorAll('.nav a').forEach(a => a.classList.toggle('active', a.dataset.route === route));
}

window.toggleSidebar = () => {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebar-backdrop');
  const isOpen = sb.classList.toggle('open');
  bd.classList.toggle('show', isOpen);
};
document.querySelectorAll('.nav a').forEach(a => a.addEventListener('click', () => {
  if (window.innerWidth <= 900) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-backdrop').classList.remove('show');
  }
}));

async function navigate() {
  const hash = location.hash.replace('#/', '') || 'hoy';
  const page = PAGES[hash] || PAGES.hoy;
  currentRoute = hash;
  setActiveNav(hash);
  $('#page-title').textContent = page.title;
  $('#page-subtitle').textContent = page.subtitle;
  $('#content').innerHTML = '<div class="loading"><span class="spinner dark"></span> Cargando...</div>';
  try { await page.render(); }
  catch (e) { $('#content').innerHTML = `<div class="err"><b>Error:</b> ${esc(e.message)}</div>`; console.error(e); }
}

function renderFunnel(f) {
  const stages = [
    { label: 'Leads', value: f.leads || 0, color: '#dc2626' },
    { label: 'Cotizadas', value: f.quotes_created || 0, color: '#ea580c' },
    { label: 'Enviadas', value: f.quotes_sent || 0, color: '#d97706' },
    { label: 'Aceptadas', value: f.quotes_accepted || 0, color: '#16a34a' }
  ];
  const max = Math.max(1, ...stages.map(s => s.value));
  let html = '<div style="display:flex;flex-direction:column;gap:6px">';
  stages.forEach((s, i) => {
    const w = s.value / max * 100;
    html += `<div style="display:flex;align-items:center;gap:10px">
      <div style="min-width:70px;font-size:12px;color:var(--gray-700);font-weight:600">${s.label}</div>
      <div style="flex:1;background:var(--gray-100);border-radius:6px;overflow:hidden;height:32px;position:relative">
        <div style="width:${w}%;height:100%;background:${s.color};display:flex;align-items:center;justify-content:flex-end;padding:0 10px;color:white;font-weight:700;font-size:13px;transition:width 0.5s">${s.value}</div>
      </div>
    </div>`;
    if (i < stages.length - 1) {
      const rate = i === 0 ? f.lead_to_quote_rate : i === 1 ? f.quote_to_sent_rate : f.sent_to_won_rate;
      html += `<div style="margin-left:80px;font-size:11px;color:var(--gray-500);font-weight:600">↓ ${rate || 0}% conversion</div>`;
    }
  });
  html += '</div>';
  return html;
}

let _activeConv = null;

window.openWaConversation = async (convId, chatwootConvId) => {
  _activeConv = { id: convId, chatwoot: chatwootConvId };
  modal(`<div class="modal-h"><div class="modal-title">Cargando conversacion...</div></div><div class="modal-b"><div class="loading"><span class="spinner dark"></span></div></div>`);
  await renderWaConversation();
};

async function renderWaConversation() {
  if (!_activeConv) return;
  try {
    const data = await rpc('chatwoot_conversation_thread', { p_conversation_id: _activeConv.id });
    const conv = data.conversation || {};
    const msgs = data.messages || [];

    const renderedMsgs = msgs.map(m => {
      const isOutgoing = m.message_type === 'outgoing';
      const author = isOutgoing ? (m.sender_name ? `${esc(m.sender_name)} (POCK)` : 'POCK') : esc(m.sender_name || conv.contact_name || 'Cliente');
      const cls = isOutgoing ? 'ai' : 'human';
      return `<div class="chat-msg ${cls}"><div class="chat-author">${author}${m.chatwoot_created_at ? ' &middot; '+fmtDate(m.chatwoot_created_at) : ''}</div>${esc(m.content||'').replace(/\n/g,'<br>')}</div>`;
    }).join('');

    const headerSub = [conv.contact_phone, conv.contact_email].filter(Boolean).join(' &middot; ') || `#${conv.chatwoot_conversation_id}`;

    modal(`
      <div class="modal-h"><div><div class="modal-title">${esc(conv.contact_name || 'Cliente')}</div><div class="muted" style="color:#ccc">${headerSub} &middot; ${msgs.length} mensajes</div></div><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-b" id="wa-thread" style="background:var(--gray-50);max-height:55vh;display:flex;flex-direction:column">
        ${msgs.length === 0 ? '<div class="empty">Sin mensajes aun en esta conversacion.</div>' : renderedMsgs}
      </div>
      <div style="border-top:1px solid var(--gray-200);padding:14px 22px;background:white">
        <div style="display:flex;gap:8px">
          <textarea id="wa-reply" placeholder="Escribi tu respuesta... (Enter para enviar, Shift+Enter para nueva linea)" style="flex:1;min-height:60px;resize:vertical" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendWaReply()}"></textarea>
          <button class="btn btn-primary" onclick="sendWaReply()" id="wa-send-btn" style="background:var(--whatsapp);align-self:flex-end">Enviar &uarr;</button>
        </div>
        <div class="muted" style="margin-top:6px">El mensaje se envia via Chatwoot al WhatsApp del cliente.</div>
      </div>
    `, '');

    // Auto-scroll al final
    setTimeout(() => { const t = document.getElementById('wa-thread'); if (t) t.scrollTop = t.scrollHeight; }, 50);
  } catch (e) { closeModal(); toast(e.message, 'error'); }
}

window.sendWaReply = async () => {
  const ta = document.getElementById('wa-reply');
  const btn = document.getElementById('wa-send-btn');
  if (!ta || !_activeConv) return;
  const msg = ta.value.trim();
  if (!msg) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Enviando';
  try {
    const r = await fetch(WA_SEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: _activeConv.chatwoot, message: msg })
    });
    if (!r.ok) throw new Error('No se pudo enviar (' + r.status + ')');
    const result = await r.json();
    if (!result.ok) throw new Error('Chatwoot respondio mal');
    ta.value = '';
    toast('Mensaje enviado al cliente.');
    // Refresca la conversacion (esperamos 1.5s a que llegue el webhook back)
    setTimeout(() => renderWaConversation(), 1500);
  } catch (e) {
    toast('Error al enviar: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Enviar &uarr;';
  }
};

          <option value="colaborador">Colaboradores</option>
          <option value="proveedor">Proveedores</option>
        </select>
      </div>
      <div id="cli-list" class="panel-body flush"><div class="loading"><span class="spinner dark"></span></div></div>
    </div>
  `;
  await loadClientes();
}

window.loadClientes = async () => {
  const search = $('#cli-search')?.value || '';
  const type = $('#cli-type')?.value || null;
  try {
    const list = await rpc('list_contacts_summary', { p_limit: 200, p_search: search, p_type: type || null });
    let html = '';
    if (!list || list.length === 0) html = `<div class="empty"><div class="empty-title">Sin contactos</div></div>`;
    else {
      html = `<table><thead><tr><th>Cliente</th><th>Tipo</th><th>Empresa</th><th>Mensajes</th><th>Cotizaciones</th><th>Pipeline</th><th>Ultimo contacto</th></tr></thead><tbody>`;
      list.forEach(c => {
        html += `<tr class="row-click" onclick="openContactModal(${c.id})">
          <td><b>${esc(c.full_name||'?')}</b><div class="muted">${esc(c.email)}</div></td>
          <td><span class="pill ${c.contact_type}">${CAT_LABEL[c.contact_type] || c.contact_type}</span></td>
          <td>${esc(c.company||'-')}</td>
          <td>${c.messages_count}</td>
          <td>${c.quotes_count}</td>
          <td>${Number(c.pipeline_clp) > 0 ? `<b>${fmtCLP(c.pipeline_clp)}</b>` : '<span class="muted">-</span>'}</td>
          <td><span class="muted">${ago(c.last_activity_at)}</span></td>
        </tr>`;
      });
      html += `</tbody></table>`;
    }
    $('#cli-list').innerHTML = html;
  } catch (e) { $('#cli-list').innerHTML = `<div class="err">${esc(e.message)}</div>`; }
};

window.openContactModal = async (id) => {
  modal(`<div class="modal-h"><div class="modal-title">Cargando cliente...</div></div><div class="modal-b"><div class="loading"><span class="spinner dark"></span></div></div>`);
  try {
    const data = await rpc('get_contact_history', { p_contact_id: id });
    const c = data.contact;
    const msgsHtml = data.messages.length === 0 ? '<div class="muted">Sin mensajes.</div>' : data.messages.map(m =>
      `<div style="padding:10px;border-left:3px solid var(--red);background:var(--gray-50);margin-bottom:8px;border-radius:6px"><div style="display:flex;justify-content:space-between"><b>${esc(m.subject||'(sin asunto)')}</b><span class="pill ${m.category}">${CAT_LABEL[m.category]||m.category}</span></div><div class="muted">${fmtDate(m.received_at)}</div><div style="font-size:12px;margin-top:4px">${esc(m.snippet||'')}</div></div>`).join('');
    const quotesHtml = data.quotes.length === 0 ? '<div class="muted">Sin cotizaciones.</div>' : `<table><thead><tr><th>N°</th><th>Total</th><th>Estado</th><th>Fecha</th><th></th></tr></thead><tbody>${data.quotes.map(q =>
      `<tr><td><b>${esc(q.quote_number)}</b></td><td>${fmtCLP(q.total)}</td><td><span class="pill ${q.status}">${STATE_LABEL[q.status]||q.status}</span></td><td>${fmtDateShort(q.created_at)}</td><td><button class="btn btn-outline btn-sm" onclick="closeModal();setTimeout(()=>openQuoteModal(${q.id}),200)">Abrir</button></td></tr>`).join('')}</tbody></table>`;
    modal(`
      <div class="modal-h"><div><div class="modal-title">${esc(c.full_name||'?')}</div><div class="muted" style="color:#ccc">${esc(c.email)}</div></div><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-b">
        <div class="detail-row"><span class="k">Tipo</span><span class="v"><span class="pill ${c.contact_type}">${CAT_LABEL[c.contact_type] || c.contact_type}</span></span></div>
        ${c.phone ? `<div class="detail-row"><span class="k">Telefono</span><span class="v">${esc(c.phone)}</span></div>` : ''}
        ${c.company ? `<div class="detail-row"><span class="k">Empresa</span><span class="v">${esc(c.company)}</span></div>` : ''}
        <div class="detail-row"><span class="k">Ultimo contacto</span><span class="v">${ago(c.last_activity_at)}</span></div>
        <div class="detail-row"><span class="k">Primera vez</span><span class="v">${fmtDate(c.created_at)}</span></div>
        ${c.notes ? `<div class="info" style="margin-top:10px;white-space:pre-wrap">${esc(c.notes)}</div>` : ''}
        <h4 style="margin:18px 0 10px;font-size:12px;color:var(--gray-500);text-transform:uppercase">Cotizaciones (${data.quotes.length})</h4>
        ${quotesHtml}
        <h4 style="margin:18px 0 10px;font-size:12px;color:var(--gray-500);text-transform:uppercase">Mensajes (${data.messages.length})</h4>
        ${msgsHtml}
      </div>
    `, `<button class="btn btn-outline" onclick="closeModal()">Cerrar</button>`);
  } catch (e) { closeModal(); toast(e.message, 'error'); }
};

// ============== PAGE: BANDEJA IA (CEO ve, no aprueba) ==============
async function renderBandeja() {
  const d = await getDashboard();
  const c = await getChatbot();
  updateBadges(d, c);
  $('#updated').textContent = 'Actualizado ' + ago(d.generated_at);
  const drafts = d.drafts;
  let html = `
    <div class="info"><b>Como funciona:</b> cuando llega un email importante, la IA redacta una respuesta y la deja en borrador en Gmail. Aqui ves lo que esta esperando aprobacion. Click para leer el contenido completo.</div>
    <div class="panel">
      <div class="panel-header"><div><div class="panel-title">Borradores pendientes (${drafts.length})</div><div class="panel-subtitle">Estan en Gmail listos para revisar y enviar</div></div></div>
      <div class="panel-body flush">`;
  if (drafts.length === 0) {
    html += `<div class="empty"><div class="empty-icon">✓</div><div class="empty-title">Bandeja al dia</div>No hay borradores pendientes.</div>`;
  } else {
    html += `<table><thead><tr><th>Cliente</th><th>Asunto</th><th>Hace</th></tr></thead><tbody>`;
    drafts.forEach(b => {
      html += `<tr class="row-click" onclick='openDraftView(${JSON.stringify(b).replace(/'/g,"&apos;")})'>
        <td><b>${esc(b.cliente||'?')}</b><div class="muted">${esc(b.email||'')}</div></td>
        <td><div class="truncate" style="font-weight:500">${esc(b.subject)}</div><div class="muted truncate" style="max-width:380px">${esc(b.summary||'')}</div></td>
        <td><span class="muted">${ago(b.generated_at)}</span></td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div></div>`;
  $('#content').innerHTML = html;
}

window.openDraftView = (b) => {
  modal(`
    <div class="modal-h"><div><div class="modal-title">Borrador para ${esc(b.cliente||'?')}</div><div class="muted" style="color:#ccc">${esc(b.email||'')}</div></div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-b">
      <div class="detail-row"><span class="k">Asunto</span><span class="v">${esc(b.subject)}</span></div>
      <div class="detail-row"><span class="k">Resumen IA</span><span class="v">${esc(b.summary||'-')}</span></div>
      <div class="detail-row"><span class="k">Generado</span><span class="v">${fmtDate(b.generated_at)}</span></div>
      <div style="margin-top:14px;padding:14px;background:var(--gray-50);border-radius:8px;font-family:Georgia,serif;white-space:pre-wrap;line-height:1.6">${esc(b.body||'')}</div>
    </div>
  `, `<button class="btn btn-outline" onclick="closeModal()">Cerrar</button>`);
};

window.loadCatalogo = async () => {
  try {
    const list = await rpc('list_products', { p_search: $('#cat-search')?.value || '', p_category: $('#cat-cat')?.value || '', p_limit: 500 });
    let html = '';
    if (!list || list.length === 0) html = `<div class="empty">Sin resultados</div>`;
    else {
      html = `<div class="muted" style="padding:10px 18px">${list.length} productos</div><table><thead><tr><th>SKU</th><th>Producto</th><th>Categoria</th><th class="r">Precio</th><th>Estado</th></tr></thead><tbody>`;
      list.forEach(p => {
        html += `<tr>
          <td class="muted">${esc(p.sku||'-')}</td>
          <td>${esc(p.name)}</td>
          <td class="muted">${esc(p.category||'-')}</td>
          <td class="r"><b>${fmtCLP(p.base_price)}</b></td>
          <td>${p.is_active ? '<span class="pill sent">Activo</span>' : '<span class="pill discarded">Inactivo</span>'}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
    }
    $('#cat-list').innerHTML = html;
  } catch (e) { $('#cat-list').innerHTML = `<div class="err">${esc(e.message)}</div>`; }
};

// ============== PAGE: HISTORIAL ==============
async function renderHistorial() {
  const d = await getDashboard();
  const c = await getChatbot();
  updateBadges(d, c);
  $('#updated').textContent = 'Actualizado ' + ago(d.generated_at);
  const logs = d.logs;
  let html = `
    <div class="info"><b>Actividad reciente:</b> que ha hecho el sistema automatico ultimamente. Util para detectar problemas o entender que esta procesando.</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Eventos hoy</div><div class="kpi-value">${logs.filter(l => new Date(l.created_at).toDateString() === new Date().toDateString()).length}</div></div>
      <div class="kpi"><div class="kpi-label">Exitosos</div><div class="kpi-value success">${logs.filter(l => l.status === 'success').length}</div></div>
      <div class="kpi"><div class="kpi-label">Errores</div><div class="kpi-value ${logs.filter(l => l.status !== 'success').length > 0 ? 'red' : ''}">${logs.filter(l => l.status !== 'success').length}</div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title">Ultimas ${logs.length} actividades</div></div>
      <div class="panel-body flush">`;
  if (logs.length === 0) html += `<div class="empty"><div class="empty-title">Sin actividad aun</div></div>`;
  else {
    html += `<table><thead><tr><th>Cuando</th><th>Que paso</th><th>Sobre</th><th>Resultado</th></tr></thead><tbody>`;
    const wf = { email_classifier_v3: 'Clasifico email entrante', email_classifier: 'Clasifico email (sistema viejo)', daily_digest: 'Envio resumen diario', pock_cotizador: 'Creo cotizacion automatica' };
    logs.forEach(l => {
      html += `<tr>
        <td><span class="muted">${ago(l.created_at)}</span><div class="muted" style="font-size:10px">${fmtDate(l.created_at)}</div></td>
        <td>${wf[l.workflow_name] || esc(l.workflow_name)}</td>
        <td>${l.category ? `<span class="pill ${l.category}">${CAT_LABEL[l.category] || l.category}</span>` : '-'}</td>
        <td>${l.status === 'success' ? '<span style="color:var(--success);font-weight:600">Bien</span>' : `<span style="color:var(--red);font-weight:600">Error</span>${l.error_message ? `<div class="muted truncate">${esc(l.error_message)}</div>` : ''}`}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div></div>`;
  $('#content').innerHTML = html;
}
